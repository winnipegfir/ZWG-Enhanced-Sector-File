name: release

on:
  release:
    types: [created]

env:
  SITU_OWNER: "ronyan"
  SITU_REPOSITORY: "VATCANSitu"

jobs:
  prepare:
    name: "🏗️ Prepare"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: olegtarasov/get-tag@v2.1.4
        id: tag-name

      - name: Get latest CZWG sector file info from GNG
        id: gng_data
        run: |
          echo "Fetching CZWG sector file information from GNG..."
          
          # Fetch the CZWG page with authentication
          PAGE_HTML=$(curl -s -H "Cookie: aeronavUsersession=${{ secrets.AERONAV_SESSION_COOKIE }}" "https://files.aero-nav.com/CZWG")
          
          # Debug: Check page size and content
          echo "Page HTML length: ${#PAGE_HTML} characters"
          echo "Looking for NAV_Data in page..."
          echo "$PAGE_HTML" | grep -c "NAV_Data" || echo "NAV_Data not found in page!"
          
          # Save for debugging (cookie is not in this file)
          echo "$PAGE_HTML" > czwg_page.html
          echo "Full page saved to czwg_page.html"
          
          # Extract the NAV_Data .7z download URL from the HTML
          # Look for href="/CZWG/NAV_Data_...7z"
          DATA_URL=$(echo "$PAGE_HTML" | grep -oP 'href="(/CZWG/NAV_Data_[^"]+\.7z)"' | grep -oP '/CZWG/NAV_Data_[^"]+\.7z' | head -1)
          
          if [ -z "$DATA_URL" ]; then
            echo "ERROR: Could not find NAV_Data download URL"
            echo "Page content preview:"
            echo "$PAGE_HTML" | head -50
            exit 1
          fi
          
          # Make URL absolute
          DATA_URL="https://files.aero-nav.com${DATA_URL}"
          
          echo "Found data URL: $DATA_URL"
          
          # Extract AIRAC from filename: NAV_Data_20260524053402-260501-1.7z
          # Pattern: NAV_Data_TIMESTAMP-AIRAC-VERSION.7z
          AIRAC_FULL=$(echo "$DATA_URL" | grep -oP '\d{12,14}-(\d{6})-\d+' | grep -oP '\d{6}' | head -1)
          
          if [ -z "$AIRAC_FULL" ]; then
            echo "Warning: Could not extract AIRAC from URL, trying page content..."
            AIRAC_FULL=$(echo "$PAGE_HTML" | grep -oP 'CZWG NAV_Data.*?(\d{4})\s*/\s*(\d{2})' | grep -oP '\d{4}\s*/\s*\d{2}' | head -1 | tr -d ' /')
          fi
          
          echo "AIRAC: $AIRAC_FULL"
          
          # Export variables
          echo "data_url=$DATA_URL" >> $GITHUB_OUTPUT
          echo "airac_version=$AIRAC_FULL" >> $GITHUB_OUTPUT
          echo "airac_update_version=01" >> $GITHUB_OUTPUT
          
          echo "✓ Successfully extracted CZWG data from GNG"

      - id: variables
        name: Export additional variables
        run: |
          echo "situ_urls=$( cd $GITHUB_WORKSPACE/.github/workflows && python3 -c 'import os; import functions; print(functions.get_latest_release_download(os.environ["SITU_OWNER"], os.environ["SITU_REPOSITORY"]))' )" >> $GITHUB_OUTPUT

    outputs:
      release_tag: ${{ steps.tag-name.outputs.tag }}
      data_url: ${{ steps.gng_data.outputs.data_url }}
      airac_version: ${{ steps.gng_data.outputs.airac_version }}
      airac_update_version: ${{ steps.gng_data.outputs.airac_update_version }}
      situ_urls: ${{ steps.variables.outputs.situ_urls }}

  update-navdata:
    name: "🔃 Update NavData"
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download sector data
        run: |
          echo "Downloading from: ${{ needs.prepare.outputs.data_url }}"
          
          # Download with authentication cookie
          curl -v --retry 5 --retry-delay 5 -L \
            -H "Cookie: aeronavUsersession=${{ secrets.AERONAV_SESSION_COOKIE }}" \
            -H "User-Agent: Mozilla/5.0" \
            -o temp.7z \
            "${{ needs.prepare.outputs.data_url }}"
          
          # Verify download
          if [ ! -f temp.7z ] || [ ! -s temp.7z ]; then
            echo "ERROR: Failed to download sector data or file is empty"
            exit 1
          fi
          
          ls -lh temp.7z
          
      - name: Extract sector data
        run: |
          7z x temp.7z -y -o/tmp/sector-data
          
          # List what we extracted
          echo "Extracted files:"
          find /tmp/sector-data -type f | head -20

      - name: Update NavData folder
        run: |
          rm temp.7z
          
          # Copy NavData - adjust paths based on actual structure
          if [ -d "/tmp/sector-data/CZWG/ICAO" ]; then
            cp -TR /tmp/sector-data/CZWG/ICAO CZWG/ICAO
          fi
          
          if [ -d "/tmp/sector-data/CZWG/NavData" ]; then
            cp -TR /tmp/sector-data/CZWG/NavData CZWG/NavData
          fi
          
          # If the structure is different, try alternative paths
          if [ -d "/tmp/sector-data/ICAO" ]; then
            cp -TR /tmp/sector-data/ICAO CZWG/ICAO
          fi
          
          if [ -d "/tmp/sector-data/NavData" ]; then
            cp -TR /tmp/sector-data/NavData CZWG/NavData
          fi

      - name: Prepare and insert new data
        run: |
          # Update name in [INFO]
          gawk -i inplace '/\[INFO\]/{ n=NR+1 } NR==n{ $0="CZWG ${{ needs.prepare.outputs.airac_version }} ${{ needs.prepare.outputs.release_tag }}" }1' *.sct

      - name: Upload sector data
        uses: actions/upload-artifact@v4
        with:
          name: sector-data
          path: |
            ./
            !.git

  latest-situ-release:
    name: "💾 Save latest VATCAN Situ release"
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Get latest release
        working-directory: ${{ runner.temp }}
        run: |
          wget ${{ needs.prepare.outputs.situ_urls }}
          mv *.dll VATCANSitu-latest.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vatcan-situ-latest
          path: ${{ runner.temp }}/VATCANSitu-latest.dll

  build-situ-source:
    name: "⚒️ Build VATCAN Situ from source"
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SITU_OWNER }}/${{ env.SITU_REPOSITORY }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build artifact
        working-directory: ${{ runner.temp }}
        run: msbuild "${env:GITHUB_WORKSPACE}\VATCANSitu.vcxproj" /p:AssemblyName=VATCANSitu-nightly /p:OutDir=${{ runner.temp }}\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vatcan-situ-nightly
          path: ${{ runner.temp }}\VATCANSitu-nightly.dll

  package-zip:
    name: "📦 Package zip"
    if: ${{ always() && needs.update-navdata.result != 'failure' && needs.latest-situ-release.result != 'failure' }}
    needs: [prepare, update-navdata, latest-situ-release, build-situ-source]
    runs-on: ubuntu-latest

    env:
      AIRAC_VERSION: ${{ needs.prepare.outputs.airac_version }}
      AIRAC_UPDATE_VERSION: ${{ needs.prepare.outputs.airac_update_version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag}}

    steps:
      - uses: actions/checkout@v4

      - name: Get sector data
        uses: actions/download-artifact@v4
        with:
          name: sector-data

      - name: Get latest VATCAN Situ
        uses: actions/download-artifact@v4
        with:
          name: vatcan-situ-latest
          path: CZWG\Plugins

      - name: Get nightly VATCAN Situ
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: vatcan-situ-nightly
          path: CZWG\Plugins

      - name: Remove extra directories
        run: |
          rm -rf .git
          rm -rf .github

      - name: Compress files
        env:
          VERSION: ${{ env.AIRAC_VERSION }}_${{ env.AIRAC_UPDATE_VERSION }}_${{ env.RELEASE_TAG }}
        run: |
          # Full package
          mv *.ese CZWG_Latest_"$VERSION".ese && mv *.sct CZWG_Latest_"$VERSION".sct

          # Insert 'sector' line into profile
          sed -i "1s/^/Settings	sector	\\\CZWG_Latest_$VERSION.sct\n/" *.prf

          zip -r ${{ runner.temp }}/CZWG_Starter_"$VERSION".zip .

          # Update package
          rm CZWG.prf
          rm -R CZWG/Settings
          rm SectorFileProviderDescriptor.txt WinnipegSectorProvider.txt
          mv *.ese CZWG_Update_"$VERSION".ese && mv *.sct CZWG_Update_"$VERSION".sct

          zip -r ${{ runner.temp }}/CZWG_Update_"$VERSION".zip .

      - name: Upload files to release
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{runner.temp}}/*.zip

  package-7z:
    name: "📦 Package 7z"
    if: ${{ always() && needs.update-navdata.result != 'failure' && needs.latest-situ-release.result != 'failure' }}
    needs: [prepare, update-navdata, latest-situ-release, build-situ-source]
    runs-on: ubuntu-latest

    env:
      AIRAC_VERSION: ${{ needs.prepare.outputs.airac_version }}
      AIRAC_UPDATE_VERSION: ${{ needs.prepare.outputs.airac_update_version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag}}

    steps:
      - uses: actions/checkout@v4

      - name: Get sector data
        uses: actions/download-artifact@v4
        with:
          name: sector-data

      - name: Get latest VATCAN Situ
        uses: actions/download-artifact@v4
        with:
          name: vatcan-situ-latest
          path: CZWG\Plugins

      - name: Get nightly VATCAN Situ
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: vatcan-situ-nightly
          path: CZWG\Plugins

      - name: Remove extra directories
        run: |
          rm -rf .git
          rm -rf .github

      - name: Compress files
        env:
          VERSION: ${{ env.AIRAC_VERSION }}_${{ env.AIRAC_UPDATE_VERSION }}_${{ env.RELEASE_TAG }}
        run: |
          # Full package
          mv *.ese CZWG_Latest_"$VERSION".ese && mv *.sct CZWG_Latest_"$VERSION".sct

          # Insert 'sector' line into profile
          sed -i "1s/^/Settings	sector	\\\CZWG_Latest_$VERSION.sct\n/" *.prf

          7z a -mm=LZMA -xr!CZWG/Sounds ${{ runner.temp }}/CZWG_Starter_"$VERSION".7z *
          7z a -mx=0 ${{ runner.temp }}/CZWG_Starter_"$VERSION".7z CZWG/Sounds

          # Update package
          rm CZWG.prf
          rm -R CZWG/Settings
          rm SectorFileProviderDescriptor.txt WinnipegSectorProvider.txt
          mv *.ese CZWG_Update_"$VERSION".ese && mv *.sct CZWG_Update_"$VERSION".sct

          7z a -mm=LZMA -xr!CZWG/Sounds ${{ runner.temp }}/CZWG_Update_"$VERSION".7z *
          7z a -mx=0 ${{ runner.temp }}/CZWG_Update_"$VERSION".7z CZWG/Sounds

      - name: Upload files to release
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{runner.temp}}/*.7z

  cleanup:
    name: "🧹 Cleanup"
    if: ${{ always() }}
    needs: [package-zip, package-7z]
    runs-on: ubuntu-latest

    steps:
      - name: Clean artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            sector-data
            vatcan-situ-latest
            vatcan-situ-nightly
